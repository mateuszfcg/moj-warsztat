services:
  app:
    image: ${MOJ_WARSZTAT_IMAGE:?Ustaw MOJ_WARSZTAT_IMAGE w pliku .env}
    container_name: moj-warsztat
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:${MOJ_WARSZTAT_HOST_PORT:-3000}:3000"
    volumes:
      - ${MOJ_WARSZTAT_DATA_DIR:-./storage}:/app/storage
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 15s
